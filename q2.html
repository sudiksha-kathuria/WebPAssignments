<!DOCTYPE html>
<html lang="en">
<head>
    <title>q2</title>
    <style>
        .b
        {
            background-color:rgb(135, 96, 190);
        }
    </style>
</head>
<body>
    <button class="b" onclick="change('red')">Button 1</button>
    <button class="b" onclick="change('green')">Button 2</button>
    <button class="b" onclick="change('blue')">Button 3</button>
</body>
<script>
    function change(color)
    {
        document.body.style.backgroundColor=color;
    }
</script>
</html>
