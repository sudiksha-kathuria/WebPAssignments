<!DOCTYPE html>
<html lang="en">
    <head>
        <title>q15</title>
    </head>
    <body>
        <form>
            <fieldset>
                <label>ENTER A TEXT</label>
                <input type="text" id="msg"><br><br>
                <label>Choose the font size</label>
                <input type="range" min="10" max="100" id="size" oninput="changeSize(event)"><br><br>
                <label>Choose the font color</label>
                <input type="color" id="colr"><br><br>
                <label>Choose the background color</label>
                <input type="color" id="bgclr">
                <button onclick="changeClr(event)">Submit</button>
            </fieldset>
        </form>
    </body>
    <script>
        function changeSize(event)
        {
            event.preventDefault();
            let s=document.getElementById('size').value;
            document.getElementById('msg').style.fontSize=s+"px";
        }
        function changeClr(event)
        {
            event.preventDefault();
            let c=document.getElementById('colr').value;
            document.getElementById('msg').style.color=c;
            let bgc=document.getElementById('bgclr').value;
            document.getElementById('msg').style.backgroundColor=bgc;
        }
    </script>
</html>
